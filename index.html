<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Livraisons — Lasagna Mia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #F7F5F2;
            --surface: #fff;
            --border: #E8E3DC;
            --primary: #1C1917;
            --accent: #B5803A;
            --muted: #9C8E82;
            --text: #2C2420;
            --text2: #6B5E55;
            --s1: #2563EB;
            --s2: #D97706;
            --s3: #7C3AED;
            --s4: #16A34A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 16px
        }

        .hdr-top {
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .hdr-brand {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .hdr-brand h1 {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            color: var(--primary)
        }

        .hdr-brand p {
            font-size: 10px;
            color: var(--muted)
        }

        .btn-ref {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-size: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            color: var(--text2);
            transition: all .15s
        }

        .btn-ref:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 12px
        }

        .stat {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            text-align: center
        }

        .stat .val {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary)
        }

        .stat .lbl {
            font-size: 9px;
            color: var(--muted);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .tabs {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border)
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            background: none;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all .15s;
            font-family: 'Inter', sans-serif
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent)
        }

        #tab-map {
            height: 280px;
            z-index: 1
        }

        .map-wrap {
            margin: 12px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 1px 4px rgba(0, 0, 0, .08)
        }

        .orders-wrap {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 14px
        }

        .group-hdr {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .gdot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .gcnt {
            margin-left: auto;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1px 7px;
            font-size: 10px;
            color: var(--text2)
        }

        .order-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 11px 13px;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 5px
        }

        .order-card:hover {
            border-color: var(--accent);
            transform: translateX(2px)
        }

        .order-card:last-child {
            margin-bottom: 0
        }

        .obar {
            width: 3px;
            border-radius: 3px;
            align-self: stretch;
            flex-shrink: 0
        }

        .oinfo {
            flex: 1;
            min-width: 0
        }

        .oname {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary)
        }

        .odesc {
            font-size: 11px;
            color: var(--text2);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .oright {
            text-align: right;
            flex-shrink: 0
        }

        .oprice {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary)
        }

        .otime {
            font-size: 10px;
            color: var(--muted);
            margin-top: 1px
        }

        .tab-content {
            display: none
        }

        .tab-content.active {
            display: block
        }

        /* Historique */
        .hist {
            padding: 12px
        }

        .table-wrap {
            border-radius: 9px;
            overflow: hidden;
            border: 1px solid var(--border);
            overflow-x: auto
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 480px
        }

        thead {
            background: var(--bg)
        }

        thead th {
            padding: 9px 12px;
            text-align: left;
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .8px;
            border-bottom: 1px solid var(--border)
        }

        tbody tr {
            border-bottom: 1px solid var(--border)
        }

        tbody tr:last-child {
            border-bottom: none
        }

        tbody td {
            padding: 9px 12px;
            font-size: 12px;
            color: var(--text2)
        }

        .tag-ok {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            background: #D1FAE5;
            color: #065F46
        }

        /* MODAL */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .4);
            backdrop-filter: blur(3px);
            z-index: 200;
            align-items: flex-end;
            justify-content: center
        }

        .overlay.open {
            display: flex
        }

        .modal {
            background: var(--surface);
            border-radius: 14px 14px 0 0;
            width: 100%;
            max-width: 520px;
            max-height: 88vh;
            overflow-y: auto;
            animation: su .3s cubic-bezier(.2, .8, .3, 1)
        }

        @keyframes su {
            from {
                transform: translateY(100%)
            }

            to {
                transform: translateY(0)
            }
        }

        .mhandle {
            width: 32px;
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            margin: 10px auto 0
        }

        .mhdr {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start
        }

        .mname {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary)
        }

        .mmeta {
            font-size: 12px;
            color: var(--text2);
            margin-top: 3px;
            line-height: 1.6
        }

        .mcls {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--muted);
            cursor: pointer;
            padding: 2px 6px
        }

        .mbody {
            padding: 14px 16px
        }

        .maddr {
            background: var(--bg);
            border-radius: 7px;
            padding: 9px 12px;
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 12px;
            line-height: 1.5
        }

        .mphone {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap
        }

        .btn-phone {
            flex: 1;
            min-width: 100px;
            padding: 9px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px
        }

        .btn-call {
            background: #DBEAFE;
            color: #1E40AF
        }

        .btn-wa {
            background: #D1FAE5;
            color: #065F46
        }

        .btn-maps {
            background: #FEF3C7;
            color: #92400E
        }

        .statut-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            margin-top: 10px
        }

        .btn-st {
            padding: 10px 6px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            color: var(--text2);
            transition: all .15s;
            text-align: center
        }

        .btn-st:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .btn-st.current {
            border-color: var(--accent);
            background: #FEF3E2;
            color: var(--accent);
            font-weight: 600
        }

        .btn-livree {
            grid-column: 1/-1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #16A34A, #15803D);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif
        }

        .btn-close-m {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text2);
            font-size: 13px;
            cursor: pointer;
            font-family: 'Inter', sans-serif
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--primary);
            color: #fff;
            border-radius: 8px;
            padding: 9px 18px;
            font-size: 13px;
            z-index: 999;
            transition: transform .3s;
            white-space: nowrap;
            opacity: 0
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1
        }

    </style>
</head>

<body>

    <header>
        <div class="hdr-top">
            <div class="hdr-brand"><span style="font-size:22px">🍝</span>
                <div>
                    <h1 id="resto-name">Lasagna Mia</h1>
                    <p>Tableau de bord livraisons</p>
                </div>
            </div>
            <button class="btn-ref" onclick="load(true)">🔄 Actualiser</button>
        </div>
        <div class="stats-row">
            <div class="stat">
                <div class="val" id="s1">–</div>
                <div class="lbl" style="color:var(--s1)">Confirmées</div>
            </div>
            <div class="stat">
                <div class="val" id="s2">–</div>
                <div class="lbl" style="color:var(--s2)">En route</div>
            </div>
            <div class="stat">
                <div class="val" id="s3">–</div>
                <div class="lbl" style="color:var(--s3)">Très proche</div>
            </div>
            <div class="stat">
                <div class="val" id="s4">–</div>
                <div class="lbl" style="color:var(--s4)">Livrées</div>
            </div>
        </div>
    </header>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('carte',this)">🗺️ Carte & commandes</button>
        <button class="tab" onclick="switchTab('hist',this)">✅ Historique</button>
    </div>

    <div class="tab-content active" id="tc-carte">
        <div class="map-wrap">
            <div id="tab-map"></div>
        </div>
        <div class="orders-wrap" id="orders-wrap"></div>
    </div>

    <div class="tab-content" id="tc-hist">
        <div class="hist">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Client</th>
                            <th>Commande</th>
                            <th>Adresse</th>
                            <th>Total</th>
                            <th>Heure</th>
                        </tr>
                    </thead>
                    <tbody id="hist-tbody"></tbody>
                </table>
            </div>
            <div id="hist-total" style="text-align:right;margin-top:10px;font-size:13px;font-weight:600;color:var(--primary)"></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="maybeClose(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="mhandle"></div>
            <div class="mhdr">
                <div>
                    <div class="mname" id="m-name"></div>
                    <div class="mmeta" id="m-meta"></div>
                </div>
                <button class="mcls" onclick="closeModal()">✕</button>
            </div>
            <div class="mbody">
                <div class="maddr" id="m-addr"></div>
                <div class="mphone" id="m-phone"></div>
                <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px">Changer le statut</div>
                <div class="statut-grid">
                    <button class="btn-st" id="btn-commande_confirmee" onclick="setStatut('commande_confirmee')">✅ Confirmée</button>
                    <button class="btn-st" id="btn-en_livraison" onclick="setStatut('en_livraison')">🚴 En route</button>
                    <button class="btn-st" id="btn-imminent" onclick="setStatut('imminent')">📍 Très proche</button>
                    <button class="btn-livree" onclick="setStatut('livree')">✅ Marquer comme livrée</button>
                </div>
                <button class="btn-close-m" onclick="closeModal()">Fermer</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const SUPABASE_URL = 'https://mcazrrbpejlgosukqwfa.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jYXpycmJwZWpsZ29zdWtxd2ZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MjAyOTUsImV4cCI6MjA4ODM5NjI5NX0.-rGCBpZZb5JFeHZk-OYEqnMcgLLdqIRgjHV5FsQJPEk';
        const RAILWAY_URL = 'https://bonmatin-bot-production.up.railway.app';
        const {
            createClient
        } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_KEY);

        const ACTIVE = ['commande_confirmee', 'en_livraison', 'imminent'];
        const ALL_ACTIVE = ['attente_adresse', 'attente_prix_livraison', 'attente_confirmation', 'attente_paiement', 'commande_confirmee', 'en_livraison', 'imminent'];

        const SCFG = {
            commande_confirmee: {
                label: 'Confirmée',
                color: '#2563EB'
            },
            en_livraison: {
                label: 'En route',
                color: '#D97706'
            },
            imminent: {
                label: 'Très proche',
                color: '#7C3AED'
            },
            livree: {
                label: 'Livrée',
                color: '#16A34A'
            },
        };

        let orders = [],
            currentOrder = null,
            map = null,
            markers = {};

        // Charge config resto
        async function loadRestoName() {
            const {
                data
            } = await db.from('config').select('value').eq('key', 'r-nom').single();
            if (data) {
                document.getElementById('resto-name').textContent = data.value;
                document.title = `Livraisons — ${data.value}`;
            }
            const {
                data: lat
            } = await db.from('config').select('value').eq('key', 'r-latitude').single();
            const {
                data: lng
            } = await db.from('config').select('value').eq('key', 'r-longitude').single();
            return {
                lat: parseFloat(lat?.value || 6.1375),
                lng: parseFloat(lng?.value || 1.2123)
            };
        }

        async function load(refresh = false) {
            const {
                data
            } = await db.from('commandes').select('*').order('id', {
                ascending: false
            });
            orders = data || [];
            renderStats();
            renderOrders();
            renderMap();
            if (document.getElementById('tc-hist').classList.contains('active')) renderHist();
        }

        function renderStats() {
            document.getElementById('s1').textContent = orders.filter(o => o.statut === 'commande_confirmee').length;
            document.getElementById('s2').textContent = orders.filter(o => o.statut === 'en_livraison').length;
            document.getElementById('s3').textContent = orders.filter(o => o.statut === 'imminent').length;
            document.getElementById('s4').textContent = orders.filter(o => o.statut === 'livree').length;
        }

        // Clustering 10km
        function buildClusters(active) {
            const visited = new Set(),
                clusters = [];
            for (const o of active) {
                if (!o.latitude || visited.has(o.id)) continue;
                const c = [o];
                visited.add(o.id);
                for (const other of active) {
                    if (!other.latitude || visited.has(other.id)) continue;
                    const dx = (o.latitude - other.latitude) * 111;
                    const dy = (o.longitude - other.longitude) * 85;
                    if (Math.sqrt(dx * dx + dy * dy) < 10) {
                        c.push(other);
                        visited.add(other.id);
                    }
                }
                clusters.push(c);
            }
            return clusters;
        }

        const ZONE_COLORS = ['#2563EB', '#D97706', '#7C3AED', '#059669', '#DC2626', '#0891B2'];

        function renderOrders() {
            const active = orders.filter(o => ALL_ACTIVE.includes(o.statut));
            const clusters = buildClusters(active.filter(o => ACTIVE.includes(o.statut)));
            const wrap = document.getElementById('orders-wrap');

            if (!active.length) {
                wrap.innerHTML = '<p style="text-align:center;padding:40px;color:var(--muted)">Aucune commande active</p>';
                return;
            }

            wrap.innerHTML = '';

            // Groupes par zone puis statut
            if (clusters.length) {
                clusters.forEach((zone, zi) => {
                    const color = ZONE_COLORS[zi % ZONE_COLORS.length];
                    const div = document.createElement('div');
                    div.innerHTML = `<div class="group-hdr"><div class="gdot" style="background:${color}"></div><span style="color:${color}">Zone ${zi+1}</span><span class="gcnt">${zone.length}</span></div>`;
                    zone.forEach(o => div.appendChild(orderCard(o, color)));
                    wrap.appendChild(div);
                });
            }

            // Commandes sans GPS
            const sansGps = active.filter(o => ACTIVE.includes(o.statut) && !o.latitude);
            if (sansGps.length) {
                const div = document.createElement('div');
                div.innerHTML = `<div class="group-hdr"><div class="gdot" style="background:var(--muted)"></div><span style="color:var(--muted)">Sans GPS</span><span class="gcnt">${sansGps.length}</span></div>`;
                sansGps.forEach(o => div.appendChild(orderCard(o, 'var(--muted)')));
                wrap.appendChild(div);
            }

            // Commandes en attente (avant confirmée)
            const attente = active.filter(o => !ACTIVE.includes(o.statut));
            if (attente.length) {
                const div = document.createElement('div');
                div.innerHTML = `<div class="group-hdr"><div class="gdot" style="background:#9C8E82"></div><span style="color:var(--muted)">En attente de confirmation</span><span class="gcnt">${attente.length}</span></div>`;
                attente.forEach(o => div.appendChild(orderCard(o, '#9C8E82')));
                wrap.appendChild(div);
            }
        }

        function orderCard(o, color) {
            const card = document.createElement('div');
            card.className = 'order-card';
            const cfg = SCFG[o.statut] || {
                label: o.statut,
                color: '#9C8E82'
            };
            card.innerHTML = `
    <div class="obar" style="background:${color}"></div>
    <div class="oinfo">
      <div class="oname">#${o.id} — ${o.client || '–'}</div>
      <div class="odesc">${o.article || '–'}</div>
      <div class="odesc" style="margin-top:2px">📍 ${o.adresse ? o.adresse.split(',').slice(0,2).join(',') : 'Adresse non renseignée'}</div>
    </div>
    <div class="oright">
      <div class="oprice">${((o.total||0)+(o.prix_livraison||0)).toLocaleString('fr-FR')}</div>
      <div class="otime">${o.heure || ''}</div>
    </div>`;
            card.onclick = () => openModal(o);
            return card;
        }

        // ── CARTE ────────────────────────────────────────────────────
        async function initMap(restoCfg) {
            map = L.map('tab-map', {
                zoomControl: true
            }).setView([restoCfg.lat, restoCfg.lng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OSM'
            }).addTo(map);
            // Marqueur restaurant
            L.marker([restoCfg.lat, restoCfg.lng], {
                icon: L.divIcon({
                    html: '<div style="font-size:24px;transform:translate(-50%,-100%)">🍝</div>',
                    className: '',
                    iconSize: [0, 0]
                })
            }).addTo(map).bindPopup('Restaurant');
        }

        function renderMap() {
            if (!map) return;
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};

            const active = orders.filter(o => ACTIVE.includes(o.statut) && o.latitude && o.longitude);
            const clusters = buildClusters(active);

            clusters.forEach((zone, zi) => {
                const color = ZONE_COLORS[zi % ZONE_COLORS.length];
                // Lignes de zone
                if (zone.length > 1) {
                    const pts = zone.map(o => [o.latitude, o.longitude]);
                    L.polyline(pts, {
                        color,
                        weight: 2,
                        dashArray: '6,4',
                        opacity: .6
                    }).addTo(map);
                }
                zone.forEach(o => {
                    const cfg = SCFG[o.statut] || {};
                    const m = L.circleMarker([o.latitude, o.longitude], {
                        radius: 10,
                        fillColor: cfg.color || color,
                        color: '#fff',
                        weight: 2,
                        fillOpacity: .9
                    }).addTo(map);
                    m.bindPopup(`<b>#${o.id} ${o.client}</b><br>${o.article}`);
                    m.on('click', () => openModal(o));
                    markers[o.id] = m;
                });
            });
        }

        // ── MODAL ────────────────────────────────────────────────────
        function openModal(o) {
            currentOrder = o;
            document.getElementById('m-name').textContent = `#${o.id} — ${o.client || '–'}`;
            document.getElementById('m-meta').innerHTML = `📦 ${o.article || '–'}<br>💰 ${((o.total||0)+(o.prix_livraison||0)).toLocaleString('fr-FR')} FCFA · ⏰ ${o.heure || '–'}`;
            document.getElementById('m-addr').textContent = '📍 ' + (o.adresse || 'Adresse non renseignée');

            const tel = (o.telephone || '').replace('whatsapp:', '');
            document.getElementById('m-phone').innerHTML = tel ? `
    <a href="tel:${tel}" class="btn-phone btn-call">📞 Appeler</a>
    <a href="https://wa.me/${tel.replace('+','')}" target="_blank" class="btn-phone btn-wa">💬 WhatsApp</a>
    ${o.latitude ? `<a href="https://www.google.com/maps/dir/?api=1&destination=${o.latitude},${o.longitude}" target="_blank" class="btn-phone btn-maps">🗺️ Itinéraire</a>` : ''}
  ` : '';

            ['commande_confirmee', 'en_livraison', 'imminent'].forEach(s => {
                document.getElementById(`btn-${s}`)?.classList.toggle('current', o.statut === s);
            });
            document.getElementById('overlay').classList.add('open');
        }

        function closeModal() {
            document.getElementById('overlay').classList.remove('open');
        }

        function maybeClose(e) {
            if (e.target === document.getElementById('overlay')) closeModal();
        }

        async function setStatut(statut) {
            if (!currentOrder) return;
            try {
                await fetch(`${RAILWAY_URL}/update-statut`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        commandeId: currentOrder.id,
                        statut
                    }),
                });
            } catch {
                /* update direct */
            }
            await db.from('commandes').update({
                statut
            }).eq('id', currentOrder.id);
            closeModal();
            showToast(statut === 'livree' ? '✅ Livraison confirmée !' : '🔄 Statut mis à jour');
            await load();
        }

        // ── HISTORIQUE ───────────────────────────────────────────────
        function renderHist() {
            const livrees = orders.filter(o => o.statut === 'livree');
            const tbody = document.getElementById('hist-tbody');
            if (!livrees.length) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--muted)">Aucune livraison</td></tr>';
                document.getElementById('hist-total').textContent = '';
                return;
            }
            const total = livrees.reduce((s, o) => s + (o.total || 0) + (o.prix_livraison || 0), 0);
            tbody.innerHTML = livrees.map(o => `<tr>
    <td>#${o.id}</td><td>${o.client||'–'}</td>
    <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.article||'–'}</td>
    <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px">${o.adresse||'–'}</td>
    <td style="font-weight:600">${((o.total||0)+(o.prix_livraison||0)).toLocaleString('fr-FR')}</td>
    <td>${o.heure||'–'}</td>
  </tr>`).join('');
            document.getElementById('hist-total').textContent = `Total encaissé : ${total.toLocaleString('fr-FR')} FCFA`;
        }

        function switchTab(name, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tc-${name}`).classList.add('active');
            btn.classList.add('active');
            if (name === 'hist') renderHist();
            if (name === 'carte' && map) setTimeout(() => map.invalidateSize(), 100);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ── INIT ─────────────────────────────────────────────────────
        (async () => {
            const restoCfg = await loadRestoName();
            await initMap(restoCfg);
            await load();
            setInterval(load, 30000);
        })();

    </script>
</body>

</html>
