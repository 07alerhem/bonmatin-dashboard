<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BonMatin — Adresse de livraison</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: sans-serif;
            background: #F8F6F1;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #2C1810, #5C3317);
            color: #fff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        header .logo {
            font-size: 24px;
        }

        header h1 {
            font-size: 15px;
            font-weight: 700;
        }

        header p {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 1px;
        }

        /* BARRE RECHERCHE */
        .search-bar {
            background: #fff;
            padding: 10px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .search-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1.5px solid #ddd;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #FF6B35;
        }

        .btn-search {
            padding: 10px 14px;
            background: #2C1810;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-gps {
            padding: 10px 12px;
            background: #FF6B35;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
        }

        /* CARTE */
        #map {
            flex: 1;
            z-index: 1;
        }

        /* HINT */
        .map-hint {
            background: rgba(44, 24, 16, 0.85);
            color: #fff;
            font-size: 11px;
            text-align: center;
            padding: 6px 12px;
            flex-shrink: 0;
        }

        /* BARRE CONFIRMATION */
        .confirm-bar {
            background: #fff;
            border-top: 2px solid #FF6B35;
            padding: 12px 14px;
            flex-shrink: 0;
            display: none;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.1);
        }

        .confirm-bar.show {
            display: flex;
        }

        .confirm-address {
            font-size: 12px;
            color: #444;
            background: #F8F6F1;
            border-radius: 8px;
            padding: 8px 12px;
            line-height: 1.5;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }

        .btn-confirm:disabled {
            background: #aaa;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* STATUS */
        .status-msg {
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
            flex-shrink: 0;
        }

        .status-msg.error {
            background: #FFE4E4;
            color: #c0392b;
            display: block;
        }

        .status-msg.info {
            background: #E8F4FD;
            color: #2980b9;
            display: block;
        }

        /* SUCCÈS */
        .success-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 40px 20px;
            text-align: center;
            gap: 16px;
        }

        .success-screen.show {
            display: flex;
        }

        .success-icon {
            font-size: 70px;
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0)
            }

            70% {
                transform: scale(1.2)
            }

            100% {
                transform: scale(1)
            }
        }

        .success-screen h2 {
            font-size: 22px;
            font-weight: 800;
            color: #2C1810;
        }

        .success-screen p {
            font-size: 14px;
            color: #666;
            max-width: 280px;
            line-height: 1.6;
        }

    </style>
</head>

<body>

    <header>
        <div class="logo">🥐</div>
        <div>
            <h1>Où livrer votre commande ?</h1>
            <p>Cherchez une adresse ou cliquez sur la carte</p>
        </div>
    </header>

    <div class="search-bar">
        <input class="search-input" id="search-input" placeholder="Ex : 12 rue de la Paix, Marseille" onkeydown="if(event.key==='Enter') searchAddress()" />
        <button class="btn-search" onclick="searchAddress()">🔍</button>
        <button class="btn-gps" onclick="useGPS()" title="Utiliser ma position">📡</button>
    </div>

    <div class="status-msg" id="status-msg"></div>

    <div id="map"></div>

    <div class="map-hint">👆 Cliquez sur la carte pour affiner l'emplacement exact</div>

    <div class="confirm-bar" id="confirm-bar">
        <div class="confirm-address" id="confirm-address"></div>
        <button class="btn-confirm" id="btn-confirm" onclick="confirmLocation()">
            ✅ Confirmer cette adresse
        </button>
    </div>

    <div class="success-screen" id="success-screen">
        <div class="success-icon">🎉</div>
        <h2>Adresse enregistrée !</h2>
        <p>Votre commande est confirmée. Un livreur sera chez vous dans <strong>20–30 minutes</strong>.</p>
        <p style="font-size:12px;color:#aaa;margin-top:8px;">Vous pouvez fermer cette page.</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://mcazrrbpejlgosukqwfa.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jYXpycmJwZWpsZ29zdWtxd2ZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MjAyOTUsImV4cCI6MjA4ODM5NjI5NX0.-rGCBpZZb5JFeHZk-OYEqnMcgLLdqIRgjHV5FsQJPEk';
        const {
            createClient
        } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const telephone = urlParams.get('tel') || '';

        let selectedLat = null,
            selectedLng = null,
            selectedAddr = '';
        let marker = null;

        // ── CARTE ────────────────────────────────────────────────
        const map = L.map('map').setView([43.2965, 5.3698], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        map.on('click', async e => {
            setPoint(e.latlng.lat, e.latlng.lng);
            selectedAddr = await reverseGeocode(e.latlng.lat, e.latlng.lng);
            showConfirm();
        });

        function setPoint(lat, lng) {
            selectedLat = lat;
            selectedLng = lng;
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lng], {
                icon: L.divIcon({
                    html: '<div style="font-size:30px;transform:translate(-50%,-100%)">📍</div>',
                    className: '',
                    iconSize: [0, 0]
                })
            }).addTo(map);
        }

        // ── RECHERCHE ADRESSE ────────────────────────────────────
        async function searchAddress() {
            const q = document.getElementById('search-input').value.trim();
            if (!q) return;
            showStatus('Recherche...', 'info');
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
                const data = await r.json();
                if (!data.length) {
                    showStatus('Adresse introuvable. Essayez autrement.', 'error');
                    return;
                }
                const {
                    lat,
                    lon,
                    display_name
                } = data[0];
                selectedAddr = display_name;
                setPoint(parseFloat(lat), parseFloat(lon));
                map.setView([parseFloat(lat), parseFloat(lon)], 17);
                hideStatus();
                showConfirm();
            } catch {
                showStatus('Erreur réseau. Vérifiez votre connexion.', 'error');
            }
        }

        // ── GPS ──────────────────────────────────────────────────
        function useGPS() {
            showStatus('Détection en cours...', 'info');
            if (!navigator.geolocation) {
                showStatus('GPS non disponible.', 'error');
                return;
            }
            navigator.geolocation.getCurrentPosition(
                async pos => {
                        const {
                            latitude: lat,
                            longitude: lng
                        } = pos.coords;
                        setPoint(lat, lng);
                        map.setView([lat, lng], 17);
                        selectedAddr = await reverseGeocode(lat, lng);
                        hideStatus();
                        showConfirm();
                    },
                    () => showStatus('Position non détectée. Cherchez votre adresse.', 'error'), {
                        enableHighAccuracy: true,
                        timeout: 10000
                    }
            );
        }

        // ── REVERSE GEOCODING ────────────────────────────────────
        async function reverseGeocode(lat, lng) {
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
                const d = await r.json();
                return d.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            } catch {
                return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            }
        }

        // ── CONFIRMATION ─────────────────────────────────────────
        function showConfirm() {
            document.getElementById('confirm-address').textContent = `📍 ${selectedAddr}`;
            document.getElementById('confirm-bar').classList.add('show');
        }

        async function confirmLocation() {
            if (!selectedLat || !selectedLng) return;
            const btn = document.getElementById('btn-confirm');
            btn.disabled = true;
            btn.textContent = '⏳ Enregistrement...';

            const {
                error
            } = await db.from('commandes')
                .update({
                    latitude: selectedLat,
                    longitude: selectedLng,
                    adresse: selectedAddr,
                    statut: 'pending'
                })
                .eq('telephone', `whatsapp:+${telephone}`)
                .eq('statut', 'awaiting_location');

            if (error) {
                console.error(error);
                showStatus('Erreur lors de l\'enregistrement. Réessayez.', 'error');
                btn.disabled = false;
                btn.textContent = '✅ Confirmer cette adresse';
                return;
            }

            // Succès
            document.querySelector('header').style.display = 'none';
            document.querySelector('.search-bar').style.display = 'none';
            document.querySelector('.map-hint').style.display = 'none';
            document.getElementById('map').style.display = 'none';
            document.getElementById('confirm-bar').style.display = 'none';
            document.getElementById('status-msg').style.display = 'none';
            document.getElementById('success-screen').classList.add('show');
        }

        // ── STATUS ───────────────────────────────────────────────
        function showStatus(msg, type) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.className = `status-msg ${type}`;
        }

        function hideStatus() {
            document.getElementById('status-msg').className = 'status-msg';
        }

    </script>
</body>

</html>
